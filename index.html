<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#fbfbfd" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Progress Dashboard</title>
<style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;color:#1d1b3a;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
:root{--accent:#5b4cf7;--accent-2:#7a6cff;--accent-line:rgba(91,76,247,.18);--accent-soft:rgba(91,76,247,.08);--ink:#1d1b3a;--soft:#5a5c6a;--muted:#8b8e98;--line:rgba(20,22,35,.07);--card:#fff;--safe-bot:env(safe-area-inset-bottom,0px)}
body{min-height:100svh;padding-bottom:calc(var(--safe-bot) + 156px)}
.app{max-width:560px;margin:0 auto;padding:22px 22px 0}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin:8px 0 22px}
.top-text{flex:1 1 auto;min-width:0}
#pageTitle{margin:0;font-size:36px;font-weight:850;letter-spacing:-.04em;color:var(--ink);line-height:1}
.top-sub{margin-top:6px;font-size:14px;font-weight:500;color:var(--soft);letter-spacing:-.005em;line-height:1.3}
.top-actions{flex:0 0 auto;display:flex;align-items:center;gap:10px}
.avatar{width:48px;height:48px;border-radius:50%;border:0;background:#fff;padding:2px;display:grid;place-items:center;flex:0 0 auto;box-shadow:0 0 0 2px var(--accent-line);appearance:none;font:inherit;color:inherit}
.avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.avatar-fallback{width:100%;height:100%;border-radius:50%;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font-weight:850;font-size:15px;text-transform:uppercase;letter-spacing:-.02em}
.polly-trigger{cursor:pointer;transition:transform .16s ease,box-shadow .18s ease}
.polly-trigger:active{transform:scale(.94)}
.polly-trigger:hover{box-shadow:0 0 0 2px var(--accent-line),0 10px 26px rgba(91,76,247,.16)}
.icon-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--accent);display:grid;place-items:center;box-shadow:0 10px 28px rgba(32,30,70,.06);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s ease}
.icon-btn:active{transform:scale(.94)}
.icon-btn svg{width:20px;height:20px;stroke-width:1.7}
.icon-btn.spin svg{animation:iconSpin 1s linear}
@keyframes iconSpin{to{transform:rotate(360deg)}}
.icon-btn.spin{animation:none}
main{margin-top:0}
.page{display:none}
.page.active{display:block}
.stack{display:grid;gap:14px}
.stack>*{opacity:0;transform:translateY(10px);animation:rise .55s cubic-bezier(.22,1,.36,1) forwards}
.stack>*:nth-child(1){animation-delay:.04s}
.stack>*:nth-child(2){animation-delay:.10s}
.stack>*:nth-child(3){animation-delay:.16s}
.stack>*:nth-child(4){animation-delay:.22s}
@keyframes rise{to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 12px 36px rgba(27,30,54,.045);overflow:hidden}
.whead{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.whead-icon{width:38px;height:38px;border-radius:11px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex:0 0 auto}
.whead-icon svg{width:20px;height:20px;stroke-width:1.8}
.whead-text{flex:1 1 auto;min-width:0}
.whead-title{font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--ink);line-height:1.2}
.whead-sub{font-size:13px;font-weight:500;color:var(--soft);margin-top:2px;line-height:1.3}
.wbars{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;align-items:end}
.wbar{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
.wbar-check{width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center}
.wbar-check svg{width:14px;height:14px;stroke-width:3}
.wbar-pill{width:100%;height:46px;border-radius:8px;background:#ece9f7;position:relative;overflow:hidden}
.wbar-pill::before{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,#7a6cff 0%,#5b4cf7 100%);transform:scaleY(0);transform-origin:bottom;opacity:0}
.wbar.is-done .wbar-pill{background:#ece9f7}
.wbar.is-done .wbar-pill::before{animation:wbarFill .72s cubic-bezier(.22,1,.36,1) forwards;animation-delay:var(--bar-delay,0ms)}
.wbar.is-done .wbar-check{opacity:0;transform:scale(.72);animation:wbarCheckPop .32s cubic-bezier(.22,1,.36,1) forwards;animation-delay:calc(var(--bar-delay,0ms) + 420ms)}
@keyframes wbarFill{0%{transform:scaleY(0);opacity:.55}60%{opacity:1}100%{transform:scaleY(1);opacity:1}}
@keyframes wbarCheckPop{0%{opacity:0;transform:scale(.72)}70%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
.wbar.is-today .wbar-check{background:rgba(91,76,247,.15);box-shadow:0 0 0 2px rgba(91,76,247,.18)}
.wbar.is-done .wbar-day{color:var(--ink);font-weight:800}
.wbar.is-today .wbar-day{color:var(--accent);font-weight:800}
.wbar-day{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9b97ae;line-height:1}
.week-card{background:linear-gradient(160deg,#fff 0%,#fbfaff 60%,#f6f3ff 100%);border-color:var(--accent-line)}
.goal-card{position:relative;background:linear-gradient(160deg,#fff 0%,#fbfaff 55%,#f4f0ff 100%);border:1px solid var(--accent-line);border-radius:22px;box-shadow:0 18px 50px rgba(91,76,247,.10);overflow:hidden}
.goal-pad{display:flex;align-items:center;gap:18px;padding:20px 20px 20px 24px}
.goal-wheel{position:relative;flex:0 0 auto;width:160px;height:160px}
.goal-wheel-svg{width:100%;height:100%;display:block;overflow:visible;transform:rotate(0deg)}
.goal-wheel-bg{fill:none;stroke:rgba(91,76,247,.18);stroke-width:14}
.goal-wheel-fg{fill:none;stroke:#5b4cf7;stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1)}
.goal-wheel-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.goal-pct-num{font-size:38px;font-weight:850;letter-spacing:-.04em;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:1px}
.goal-pct-sign{font-size:18px;font-weight:800;color:var(--accent)}
.goal-pct-of{margin-top:4px;font-size:13px;font-weight:500;color:var(--soft);letter-spacing:.01em}
.goal-side{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;line-height:1.1}
.goal-fraction{display:flex;align-items:baseline;gap:5px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.04em;white-space:nowrap}
.goal-fraction-done,.goal-fraction-total{font-size:42px;line-height:.95}
.goal-fraction-done{color:var(--ink);font-weight:400}
.goal-fraction-total{color:var(--ink);font-weight:900}
.goal-fraction-slash{font-size:38px;font-weight:300;color:#b9b5ca;line-height:.95;margin:0 2px;transform:translateY(-1px);display:inline-block}
.goal-fraction-unit{font-size:14px;font-weight:850;color:var(--soft);letter-spacing:-.01em;margin-left:1px}
.goal-target{font-size:13px;font-weight:650;color:var(--soft);letter-spacing:-.01em;line-height:1.2;text-align:center}
.goal-side-sub{font-size:15px;font-weight:800;color:var(--soft);letter-spacing:-.01em}
.goal-side-sub strong{color:var(--ink);font-weight:900}
.goal-dot{margin:0 4px;color:#c5c3d1}
.wg-card{background:linear-gradient(160deg,#fff 0%,#fbfaff 60%,#f6f3ff 100%);border-color:var(--accent-line)}
.wg-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.wg-head-left{display:flex;align-items:center;gap:12px;flex:1 1 auto;min-width:0}
.wg-head-icon{width:38px;height:38px;border-radius:11px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex:0 0 auto}
.wg-head-icon svg{width:20px;height:20px;stroke-width:1.8}
.wg-head-text{flex:1 1 auto;min-width:0}
.wg-head-title{font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--ink);line-height:1.2}
.wg-head-sub{font-size:13px;font-weight:500;color:var(--soft);margin-top:2px;line-height:1.3}
.wg-head-right{flex:0 0 auto;text-align:right;line-height:1}
.wg-head-value{font-size:20px;font-weight:850;letter-spacing:-.025em;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums}
.wg-head-curr{font-size:11px;font-weight:600;color:var(--muted);margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.wg-chart{position:relative;height:170px;margin-top:4px;touch-action:pan-y;cursor:crosshair;padding-right:6px}
.wg-svg{width:100%;height:100%;display:block;overflow:visible}
.wg-grid{stroke:rgba(20,22,35,.06);stroke-width:1;stroke-dasharray:2 4}
.wg-yl{font-size:9.5px;font-weight:750;fill:var(--muted);font-family:inherit}
.wg-area{fill:url(#wgGrad);opacity:.55}
.wg-line{fill:none;stroke:#5b4cf7;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:600;stroke-dashoffset:600;animation:drawLine .9s cubic-bezier(.22,1,.36,1) .15s forwards}
.wg-dot{fill:#5b4cf7;stroke:#fff;stroke-width:2.5;opacity:0;transform-origin:center;transform-box:fill-box;animation:popIn .35s cubic-bezier(.34,1.56,.64,1) forwards;transition:r .18s ease,stroke-width .18s ease,filter .18s ease}
.wg-dot.wg-dot-last{r:5;fill:var(--accent);stroke-width:3;animation-delay:.4s}
.wg-dot.wg-dot-last:not(:nth-last-of-type(1)){r:5;fill:var(--accent)}
.wg-dot.active{r:6.5;stroke-width:3.5;filter:drop-shadow(0 4px 8px rgba(91,76,247,.28))}
@keyframes drawLine{to{stroke-dashoffset:0}}
@keyframes popIn{0%{opacity:0;transform:scale(.2)}60%{opacity:1;transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}
.spark-cursor{stroke:rgba(91,76,247,.35);stroke-width:1;stroke-dasharray:3 3;opacity:0;transition:opacity .2s ease;pointer-events:none}
.spark-cursor.visible{opacity:1}
.spark-label-g{transition:opacity .18s ease;pointer-events:none}
.spark-label-bg{fill:#1d1b3a;opacity:.92}
.spark-label{font-size:11px;font-weight:800;letter-spacing:.01em;fill:#fff;font-family:inherit}
.wg-x-labels{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;padding:0 0 0 2px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.01em;line-height:1.2}
.wg-x-labels .wtx{flex:1 1 0;text-align:center;min-width:0}
.wg-x-labels .wtx-current{color:var(--accent);font-weight:800}
.wg-x-labels .wg-x-unit{flex:0 0 auto;color:var(--muted);font-weight:700;margin-left:6px}
.wg-view-toggle{order:3;flex:0 0 100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;padding:5px;margin-top:2px;border:1px solid var(--accent-line);border-radius:999px;background:rgba(255,255,255,.72);box-shadow:inset 0 1px 0 rgba(255,255,255,.75),0 8px 22px rgba(91,76,247,.06)}
.wg-view-btn{appearance:none;border:0;border-radius:999px;background:transparent;color:var(--soft);min-height:36px;padding:0 10px;font:inherit;font-size:12px;font-weight:850;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:background .24s ease,color .24s ease,box-shadow .24s ease,transform .15s ease}
.wg-view-btn.is-active{background:linear-gradient(160deg,#7a6cff 0%,#5b4cf7 100%);color:#fff;box-shadow:0 8px 20px rgba(91,76,247,.28)}
.wg-view-btn:not(.is-active):hover{background:var(--accent-soft);color:var(--accent)}
.wg-view-btn:active{transform:scale(.96)}
.wg-view-btn:focus-visible{outline:2px solid rgba(91,76,247,.35);outline-offset:2px}
.wg-card .wg-head-sub,.wg-card .wg-head-right,.wg-card .wg-chart,.wg-card .wg-x-labels{transition:opacity .26s ease,transform .26s cubic-bezier(.22,1,.36,1),filter .26s ease}
.wg-card.wg-switch-out .wg-head-sub,.wg-card.wg-switch-out .wg-head-right,.wg-card.wg-switch-out .wg-chart,.wg-card.wg-switch-out .wg-x-labels{opacity:0;transform:translateY(8px);filter:blur(2px)}
.wg-card.wg-switch-in .wg-head-sub,.wg-card.wg-switch-in .wg-head-right,.wg-card.wg-switch-in .wg-chart,.wg-card.wg-switch-in .wg-x-labels{animation:wgSwitchIn .38s cubic-bezier(.22,1,.36,1) both}
.wg-card.wg-switch-in .wg-chart{animation-delay:.04s}
.wg-card.wg-switch-in .wg-x-labels{animation-delay:.08s}
@keyframes wgSwitchIn{0%{opacity:0;transform:translateY(10px);filter:blur(2px)}100%{opacity:1;transform:none;filter:blur(0)}}
.wg-now.flash{animation:wgFlash .45s ease}
@keyframes wgFlash{0%{transform:translateY(2px);opacity:.55}100%{transform:none;opacity:1}}
.profile-card{background:linear-gradient(160deg,#fff 0%,#fbfaff 58%,#f6f3ff 100%);border-color:var(--accent-line);box-shadow:0 18px 50px rgba(91,76,247,.08)}
.prof-head{display:flex;align-items:center;gap:14px;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid rgba(91,76,247,.12)}
.prof-avatar{width:58px;height:58px;border-radius:50%;background:#fff;padding:2px;box-shadow:0 0 0 2px var(--accent-line),0 10px 24px rgba(91,76,247,.10);flex:0 0 auto;overflow:hidden}
.prof-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.prof-name{font-size:22px;font-weight:850;letter-spacing:-.03em;color:var(--ink);line-height:1.05}
.prof-tag{display:inline-flex;margin-top:7px;padding:5px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:850;letter-spacing:.06em;text-transform:uppercase}
.prof-rows{display:grid;gap:9px}
.prof-row{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:12px;padding:14px 15px;border:1px solid rgba(91,76,247,.10);border-radius:17px;background:rgba(255,255,255,.78);box-shadow:0 8px 18px rgba(91,76,247,.035);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
.prof-row:hover{transform:translateY(-1px);border-color:rgba(91,76,247,.18);box-shadow:0 12px 24px rgba(91,76,247,.07)}
.prof-ico{width:36px;height:36px;border-radius:13px;background:linear-gradient(160deg,rgba(91,76,247,.12),rgba(91,76,247,.06));color:var(--accent);display:grid;place-items:center;flex:0 0 auto}
.prof-ico svg{width:18px;height:18px;stroke-width:2}
.prof-k{font-size:15px;font-weight:750;color:var(--soft);letter-spacing:-.01em;line-height:1.15;min-width:0}
.prof-v{font-size:15px;font-weight:750;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.15;text-align:right;white-space:nowrap}
.prof-row.is-wide{grid-column:auto}
.prof-notes{margin-top:12px;padding:14px;border:1px solid rgba(91,76,247,.10);border-radius:18px;background:rgba(255,255,255,.62)}
.prof-notes-title{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:850;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.prof-notes-title svg{width:16px;height:16px;color:var(--accent);stroke-width:2}
.prof-notes-list{margin:0;padding-left:18px;display:grid;gap:6px;color:var(--soft);font-size:13.5px;line-height:1.4}
.section-stack{display:grid;gap:16px}
.section{background:linear-gradient(160deg,#fff 0%,#fbfaff 100%);border:1px solid var(--accent-line);border-radius:22px;padding:18px;box-shadow:0 10px 28px rgba(91,76,247,.06);position:relative;overflow:hidden}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding-bottom:14px;margin-bottom:12px;border-bottom:1px solid rgba(91,76,247,.12)}
.day-name{font-size:18px;font-weight:850;letter-spacing:-.02em;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0;line-height:1.15}
.day-meta{text-align:right;line-height:1.05;flex:0 0 auto;padding-top:1px}
.total{font-size:18px;font-weight:850;color:var(--ink);letter-spacing:-.015em;font-variant-numeric:tabular-nums}
.total.est-total{color:var(--accent)}
.total .unit{font-size:11.5px;font-weight:700;color:currentColor;opacity:.75;margin-left:3px;letter-spacing:.01em}
.unit{font-size:.7em;color:var(--muted);font-weight:600;margin-left:3px}
.items{display:grid;gap:8px}
.item{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;padding:13px 14px;color:var(--ink);font-size:15px;background:rgba(255,255,255,.76);border:1px solid rgba(91,76,247,.10);border-radius:15px;box-shadow:0 5px 14px rgba(91,76,247,.035)}
.item:last-child{border-bottom:1px solid rgba(91,76,247,.10)}
.item .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 0 4px var(--accent-soft)}
.item-name{color:var(--ink);font-weight:550;line-height:1.35;min-width:0}
.item-val{font-size:14.5px;font-weight:800;color:var(--ink);letter-spacing:-.01em;font-variant-numeric:tabular-nums;white-space:nowrap}
.item-val.est-kcal{color:var(--accent);opacity:.9}
.item-val .unit{font-size:11px;font-weight:700;color:currentColor;opacity:.75;margin-left:3px;letter-spacing:.01em}
.log-detail{display:block}.log-detail summary{list-style:none;cursor:pointer}.log-detail summary::-webkit-details-marker{display:none}
.item.has-detail{grid-template-columns:auto 1fr auto auto}.detail-chev{width:28px;height:28px;border-radius:999px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;transition:transform .18s ease,background .18s ease}.detail-chev svg{width:15px;height:15px;stroke-width:2.5}.log-detail[open] .detail-chev{transform:rotate(180deg)}
.detail-panel{margin:7px 2px 2px 26px;padding:11px 12px;border-radius:14px;background:rgba(91,76,247,.045);border:1px solid rgba(91,76,247,.09);display:grid;gap:8px}.food-lines{margin-top:8px}.detail-head,.detail-row{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:10px;align-items:start;color:var(--soft);font-size:13px;font-weight:650;line-height:1.3}.workout-detail .detail-row{grid-template-columns:minmax(0,1fr) auto}.detail-head{padding-bottom:6px;border-bottom:1px solid rgba(91,76,247,.10);font-size:10.5px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}.detail-row strong{display:block;color:var(--ink);font-size:13.5px;font-weight:850}.detail-amount{display:block;color:var(--muted);font-size:12px;margin-top:2px}.detail-macros{white-space:nowrap;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink);font-weight:850}.detail-note{color:var(--soft);font-size:13px;font-weight:650;line-height:1.35}.detail-note strong{color:var(--ink);font-weight:850}
.est-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;line-height:1.2;flex:0 0 auto}
.est-tag .est-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:34px 22px;color:var(--muted);font-size:15px;text-align:center}
.empty small{display:block;margin-top:6px;font-size:13px;color:var(--muted);opacity:.7;font-weight:500}
.plan-button{width:100%;border:0;border-radius:20px;background:linear-gradient(160deg,#7a6cff 0%,#5b4cf7 100%);color:#fff;min-height:54px;padding:0 18px;margin:2px 0 0;display:flex;align-items:center;justify-content:center;gap:10px;font:inherit;font-size:15px;font-weight:850;letter-spacing:-.01em;box-shadow:0 14px 32px rgba(91,76,247,.24);cursor:pointer;transition:transform .15s ease,box-shadow .18s ease,filter .18s ease}
.plan-button svg{width:19px;height:19px;stroke-width:2.2}
.plan-button:hover{filter:saturate(1.05);box-shadow:0 18px 38px rgba(91,76,247,.30)}
.plan-button:active{transform:scale(.97)}
.plan-modal{position:fixed;inset:0;z-index:42;display:grid;place-items:center;padding:22px 18px;background:rgba(29,27,58,.18);backdrop-filter:blur(0);-webkit-backdrop-filter:blur(0);opacity:0;pointer-events:none;transition:opacity .28s ease,background .28s ease,backdrop-filter .28s ease,-webkit-backdrop-filter .28s ease}
.plan-modal.open{opacity:1;pointer-events:auto;background:rgba(29,27,58,.30);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}

function mapProteinFields(obj) {

  }
}

function animateGoalCard(root){

  const pctEl=card.querySelector('.goal-pct-num');

  const pct=Number(fg?.dataset.pct||0);
  const startTs=performance.now();
  const dur=900;
  const delay=120;
  const tick=(now)=>{
    const t=Math.max(0,Math.min(1,(now-startTs-delay)/dur));
    const ease=1-Math.pow(1-t,3);
    const v=Math.round(pct*ease);
    if(pctEl) pctEl.firstChild.textContent=v;
    if(fg) fg.setAttribute('stroke-dashoffset', (circ*(1-pct/100*ease)).toFixed(2));
    if(t<1) requestAnimationFrame(tick);
    else {
      if(pctEl) pctEl.firstChild.textContent=pct;

  };

function todayMacrosCard(){
  const d=latestDay();
  if(!d) return '';
  const m=dayMacroTotals(d);
  const kcalTarget=parseKcalTarget(m.kcalTarget);
  const defaultProt = DATA?.profile?.proteinTargetG || 135;
  const defaultCal = DATA?.profile?.calorieTarget?.max || 2600;
  const proteinTarget=m.proteinTargetG||defaultProt;
  const kcalPct=Math.max(0,Math.min(100,Math.round((m.kcal/(kcalTarget||defaultCal))*100)));
  const proteinPct=Math.max(0,Math.min(100,Math.round((m.proteinG/(proteinTarget||defaultProt))*100)));
  return `<section class="macro-grid" aria-label="Today calories and protein"><div class="macro-card"><div class="macro-label">Calories</div><div class="macro-value">${fmtKcal(m.kcal)}<span class="macro-unit">kcal</span></div><div class="macro-sub">Target ${m.kcalTarget}</div><div class="macro-bar"><div class="macro-fill" style="--pct:${kcalPct}%"></div></div></div><div class="macro-card"><div class="macro-label">Protein</div><div class="macro-value">${fmtProtein(m.proteinG)}<span class="macro-unit">g</span></div><div class="macro-sub">Target ${proteinTarget}g</div><div class="macro-bar"><div class="macro-fill" style="--pct:${proteinPct}%"></div></div></div></section>`;
}

function wireWeightGraphView(scope){

function wireWeightSpark(scope){
  const root=scope||document;
  const spark=root.querySelector ? root.querySelector('#weightSpark') : (root.getElementById?root.getElementById('weightSpark'):null);
  if(!spark) return;
  const wrap=spark.closest('.wg-chart') || spark.parentElement;
  const weightEl=(root.querySelector?root.querySelector('#sparkDetailWeight'):null) || (root.getElementById?root.getElementById('sparkDetailWeight'):null);
  const labelG=root.querySelector?root.querySelector('#sparkLabelG'):null;
  const labelEl=root.querySelector?root.querySelector('#sparkLabel'):null;
  const labelBg=root.querySelector?root.querySelector('#sparkLabelBg'):null;
  const W=Number(spark.getAttribute('viewBox').split(' ')[2]);
  const H=Number(spark.getAttribute('viewBox').split(' ')[3]);
  const shortDate=(iso)=>{ const d=new Date(`${iso}T12:00:00`); return d.toLocaleDateString(undefined,{day:'numeric',month:'short'}); };
  let activeIdx=-1;
  const show=(p,animate=true)=>{
    if(weightEl){
      weightEl.innerHTML = `${p.st}<span class="unit">st</span> ${p.lb}<span class="unit">lb</span>`;
      if(animate){
        weightEl.classList.remove('flash');
        void weightEl.offsetWidth;
        weightEl.classList.add('flash');
      }
    }
  };
  const positionLabel=(cx, cy, pt)=>{
    if(!labelEl || !labelBg || !labelG || !pt) return;
    labelEl.textContent = `${pt.st}st ${pt.lb}lb • ${shortDate(pt.date)}`;
    labelG.setAttribute('opacity','1');
    const padX=6;
    const half=labelEl.getBBox().width/2;
    const w=half*2+padX*2;
    let left=cx-w/2;
    if(left<2) left=2;
    if(left+w>W-2) left=W-2-w;
    let top=cy-26;
    if(top<2) top=cy+12;
    labelBg.setAttribute('x',left);
    labelBg.setAttribute('y',top);
    labelBg.setAttribute('width',w);
    labelBg.setAttribute('height',18);
    labelEl.setAttribute('x',left+w/2);
    labelEl.setAttribute('y',top+13);
  };
  const hideLabel=()=>{ if(labelG) labelG.setAttribute('opacity','0'); };
  const setActive=(idx,pt)=>{
    if(idx===activeIdx) return;
    const dots=spark.querySelectorAll('circle.wg-dot');
    dots.forEach(d=>d.classList.remove('active'));
    const target=dots[idx];
    if(!target) return;
    target.classList.add('active');
    activeIdx=idx;
    const cx=Number(target.getAttribute('cx')), cy=Number(target.getAttribute('cy'));
    const cursor=spark.querySelector('.spark-cursor');
    if(cursor){ cursor.setAttribute('x1',cx); cursor.setAttribute('x2',cx); cursor.setAttribute('y1',0); cursor.setAttribute('y2',H); cursor.classList.add('visible'); }
    if(pt) positionLabel(cx,cy,pt);
  };
  const activateFromEvent=(e)=>{
    const rect=spark.getBoundingClientRect();
    const x=(e.clientX||e.pageX||0)-rect.left;
    let best=null, bestDist=Infinity;
    [...spark.querySelectorAll('circle.wg-dot')].forEach(p=>{
      const dist=Math.abs((p.getBBox().x + p.getBBox().width/2) - x);
      if(dist<bestDist){ bestDist=dist; best=p; }
    });
    if(best){
      const idx=Number(best.dataset.idx);
      const pt={date:best.dataset.date, st:Number(best.dataset.st), lb:Number(best.dataset.lb)};
      if(pt.date){ setActive(idx,pt); show(pt,true); }
    }
  };
  let dragging=false;
  wrap.addEventListener('pointerdown', e=>{ dragging=true; activateFromEvent(e); });
  window.addEventListener('pointermove', e=>{ if(dragging) activateFromEvent(e); }, {passive:true});
  window.addEventListener('pointerup', ()=>{ dragging=false; });
  wrap.addEventListener('pointerleave', ()=>{
    const last=(DATA.weighIns||[]).slice().sort((a,b)=>a.date.localeCompare(b.date)).at(-1);
    if(last){ show(last,false); }
    spark.querySelectorAll('circle.wg-dot').forEach(d=>d.classList.remove('active'));
    const cursor=spark.querySelector('.spark-cursor');
    if(cursor) cursor.classList.remove('visible');
    hideLabel();
    activeIdx=-1;
  });
  wrap.style.touchAction='pan-y';
  const lastDot=spark.querySelector('circle.wg-dot:last-of-type');
  if(lastDot){
    const idx=Number(lastDot.dataset.idx);
    const pt={date:lastDot.dataset.date, st:Number(lastDot.dataset.st), lb:Number(lastDot.dataset.lb)};
    if(pt.date){
      const cx=Number(lastDot.getAttribute('cx')), cy=Number(lastDot.getAttribute('cy'));
      positionLabel(cx,cy,pt);
    }
  }
}

function dayHasFood(d){return (d.food&&d.food.length)||(d.drinks&&d.drinks&&d.drinks.length)}
function dayHasWorkout(d){return d && d.workouts && d.workouts.length}
function fmtKcal(v){ return Number.isFinite(v) ? v.toLocaleString() : '—'; }
function fmtProtein(v){ return Number.isFinite(v) ? Math.round(v).toLocaleString() : '—'; }
const sumProtein=items=>(items||[]).filter(x=>Number.isFinite(x.proteinG)).reduce((a,x)=>a+x.proteinG,0);
function dayMacroTotals(d){
  const all=[...(d?.food||[]),...(d?.drinks||[])];
  const totals=d?.totals||{};
  return {
    kcal:Number.isFinite(totals.kcal)?totals.kcal:sumKcal(all),
    proteinG:Number.isFinite(totals.proteinG)?totals.proteinG:sumProtein(all),
    kcalTarget:totals.kcalTarget || DATA?.profile?.calorieTarget && `${DATA.profile.calorieTarget.min}-${DATA.profile.calorieTarget.max}` || '2500-2600',
    proteinTargetG:Number.isFinite(totals.proteinTargetG)?totals.proteinTargetG:(DATA?.profile?.proteinTargetG||135)
  };
}
function parseKcalTarget(target){
  if(typeof target==='number') return target;
  const nums=String(target||'').match(/\d+/g)?.map(Number)||[];
  if(nums.length>=2) return nums[1];
  return nums[0]||(DATA?.profile?.calorieTarget?.max || 2600);
}
function splitDayLabel(d){
  const lbl=d.label || fmtDate(d.date) || '';
  const parts=lbl.split(' ');
  if(parts.length>=2 && /^[A-Za-z]{3,4}$/.test(parts[0]) && /^\d/.test(parts[1])){
    return {weekday:parts.slice(0,parts.length-1).join(' '), day:parts[parts.length-1]};
  }
  return {weekday:'', day:lbl};
}
function currentMonday(d){ const x=new Date(d); x.setHours(12,0,0,0); x.setDate(x.getDate()-((x.getDay()+6)%7)); return x; }
function fmtWeekRange(monday){
  const sunday=new Date(monday); sunday.setDate(monday.getDate()+6);
  const ms=(d)=>d.toLocaleDateString(undefined,{month:'short'});
  return monday.getMonth()===sunday.getMonth()
    ? `${ms(monday)} ${monday.getDate()} – ${sunday.getDate()}`
    : `${ms(monday)} ${monday.getDate()} – ${ms(sunday)} ${sunday.getDate()}`;
}
function weekKey(monday){ return monday.toISOString().slice(0,10); }
function getWeeksFor(kind){
  const hasData=kind==='food'?dayHasFood:dayHasWorkout;
  const seen=new Map();
  for(const d of (DATA.days||[])){
    if(!hasData(d)) continue;
    const monday=currentMonday(new Date(`${d.date}T12:00:00`));
    const k=weekKey(monday);
    if(!seen.has(k)) seen.set(k,{monday,count:0,key:k});
    seen.get(k).count++;
  }
  return Array.from(seen.values()).sort((a,b)=>b.monday-a.monday);
}
function getActiveWeek(kind){
  const weeks=getWeeksFor(kind);
  if(weeks.length===0) return null;
  const key=kind==='workout'?window.SELECTED_WORKOUT_WEEK:window.SELECTED_FOOD_WEEK;
  if(key){
    const found=weeks.find(w=>w.key===key);
    if(found) return found;
  }
  return weeks[0];
}
function setActiveWeek(kind, key){
  const k=kind==='workout'?'SELECTED_WORKOUT_WEEK':'SELECTED_FOOD_WEEK';
  window[k]=key;
  renderPage(kind,true);
}
function stepWeek(kind, dir){
  const weeks=getWeeksFor(kind);
  if(weeks.length===0) return;
  const k=kind==='workout'?'SELECTED_WORKOUT_WEEK':'SELECTED_FOOD_WEEK';
  const cur=window[k]||weeks[0].key;
  const idx=weeks.findIndex(w=>w.key===cur);
  const next=Math.max(0,Math.min(weeks.length-1, idx+dir));
  if(next===idx) return;
  window[k]=weeks[next].key;
  const root=$(`page-${kind}`);
  if(root){
    const stack=root.querySelector('.section-stack');
    if(stack){
      stack.classList.add(dir>0?'slide-in-left':'slide-in-right');
      setTimeout(()=>{ renderPage(kind,true); }, 180);
    } else {
      renderPage(kind,true);
    }
  } else {
    renderPage(kind,true);
  }
}
function weekStepper(kind, weeks, active){
  const idx=weeks.findIndex(w=>w.key===active.key);
  const atNewest=idx<=0;
  const atOldest=idx>=weeks.length-1;
  const thisMonday=currentMonday(new Date());
  const lastMonday=new Date(thisMonday); lastMonday.setDate(thisMonday.getDate()-7);
  const k=weekKey(active.monday);
  let title=`Week of ${active.monday.toLocaleDateString(undefined,{month:'short',day:'numeric'})}`;
  if(k===weekKey(thisMonday)) title='This week';
  else if(k===weekKey(lastMonday)) title='Last week';
  return `<div class="wt-stepper"><button class="wt-arrow${atOldest?' disabled':''}" aria-label="Previous week" onclick="stepWeek('${kind}',1)">${ICONS['chevron-left']||'‹'}</button><div class="wt-stepper-info"><div class="wt-stepper-title">${title}</div><div class="wt-stepper-sub">${fmtWeekRange(active.monday)}</div></div><button class="wt-arrow${atNewest?' disabled':''}" aria-label="Next week" onclick="stepWeek('${kind}',-1)">${ICONS['chevron-right']||'›'}</button></div>`;
}
function filterDaysToWeek(days, monday){
  const k=weekKey(monday);
  return days.filter(d=>weekKey(currentMonday(new Date(`${d.date}T12:00:00`)))===k).sort((a,b)=>b.date.localeCompare(a.date));
}
function foodDetailRows(m){
  const rows=Array.isArray(m.ingredients)?m.ingredients:(Array.isArray(m.components)?m.components:(Array.isArray(m.breakdown)?m.breakdown:[]));
  if(!rows.length) return '';
  const head='<div class="detail-head"><span>Ingredient</span><span>kcal</span><span>protein</span></div>';
  return rows.map(x=>{
    const name=x.name||x.ingredient||x.item||'Ingredient';
    const amount=x.amount||x.qty||x.quantity||x.serving||'';
    const kcal=Number.isFinite(x.kcal)?fmtKcal(x.kcal):'—';
    const protein=Number.isFinite(x.proteinG)?`${fmtProtein(x.proteinG)}g`:'—';
    return `<div class="detail-row"><div><strong>${name}</strong>${amount?`<span class="detail-amount">${amount}</span>`:''}</div><div class="detail-macros">${kcal}</div><div class="detail-macros">${protein}</div></div>`;
  }).join('').replace(/^/,head);
}
function workoutDetailRows(w){
  const rows=Array.isArray(w.exercises)?w.exercises:(Array.isArray(w.sets)?w.sets:(Array.isArray(w.breakdown)?w.breakdown:[]));
  return rows.map(x=>{
    const name=x.name||x.exercise||x.item||x.set||'Exercise';
    const amount=x.reps||x.sets||x.duration||x.amount||'';
    const reps=Array.isArray(amount)?amount.join(' / '):amount;
    const kcal=Number.isFinite(x.kcal)?`${fmtKcal(x.kcal)} kcal`:'';
    const protein=Number.isFinite(x.proteinG)?`${fmtProtein(x.proteinG)}g protein`:'';
    const macros=[kcal,protein].filter(Boolean).join(' · ');
    const right=[reps,macros].filter(Boolean).join(' · ') || '—';
    const sub=[x.weight,x.note].filter(Boolean).join(' · ');
    return `<div class="detail-row"><div><strong>${name}</strong>${sub?`<span>${sub}</span>`:''}</div><div class="detail-macros">${right}</div></div>`;
  }).join('');
}
function expandableItem({estCls='', name='', val='', details='', note='', kind='food'}){
  const hasDetails=!!(details||note);
  const noteHtml=note?`<div class="detail-note"><strong>Note:</strong> ${note}</div>`:'';
  if(!hasDetails) return `<div class="item${estCls}"><span class="dot"></span><div style="min-width:0;flex:1"><div class="item-name">${name}</div></div>${val}</div>`;
  return `<details class="log-detail ${kind}-detail"><summary class="item has-detail${estCls}"><span class="dot"></span><div style="min-width:0;flex:1"><div class="item-name">${name}</div></div><span class="detail-chev" aria-hidden="true">${ICONS['chevron-right']||'⌄'}</span>${val}</summary><div class="detail-panel ${kind==='food'?'food-lines':''}">${details}${noteHtml}</div></details>`;
}
function foodDayBlock(d){
  const macros=dayMacroTotals(d);
  const allItems=[...(d.food||[]).map(m=>({...m,kind:'food'})),...(d.drinks||[]).map(dr=>({...dr,kind:'drink'}))];
  const estCount=allItems.filter(x=>x.estimated).length;
  const estTag=estCount?`<span class="est-tag" title="Some values are estimated"><span class="est-dot"></span>estimated</span>`:'';
  const rows=allItems.map(m=>{
    const estCls=m.estimated?' est':'';
    const valCls=m.estimated?'item-val est-kcal':'item-val';
    const hasKcal=Number.isFinite(m.kcal), hasProtein=Number.isFinite(m.proteinG);
    const val=`<div class="item-val-stack"><span class="${valCls}">${hasKcal?fmtKcal(m.kcal):'—'}<span class="unit">kcal</span></span><span class="item-protein">${hasProtein?fmtProtein(m.proteinG):'—'}g protein</span></div>`;
    return expandableItem({estCls, name:m.name, val, details:foodDetailRows(m), note:m.note, kind:m.kind});
  }).join('');
  const totalHtml=`<span class="total${estCount?' est-total':''}">${macros.kcal?fmtKcal(macros.kcal):'—'}<span class="unit">kcal</span></span><div class="total-sub">${fmtProtein(macros.proteinG)}g protein</div>`;
  return `<section class="section"><div class="section-head"><div class="day-name">${d.label||fmtDate(d.date)}${estTag}</div><div class="day-meta">${totalHtml}</div></div><div class="items">${rows}</div></section>`;
}
function workDayBlock(d){
  const rows=(d.workouts||[]).map(w=>{
    const hasKcal=Number.isFinite(w.kcal);
    const isEstimated=!!w.estimated;
    const valCls=isEstimated?'item-val est-kcal':'item-val';
    const val=hasKcal?`<span class="${valCls}">${fmtKcal(w.kcal)}<span class="unit">kcal</span></span>`:`<span class="item-val">—</span>`;
    return expandableItem({estCls:isEstimated?' est':'', name:w.name, val, details:workoutDetailRows(w), note:w.note, kind:'workout'});
  }).join('');
  const totalKcal=sumKcal(d.workouts);
  const estCount=(d.workouts||[]).filter(w=>Number.isFinite(w.kcal)&&w.estimated).length;
  const estTag=estCount?`<span class="est-tag" title="Some values are estimated"><span class="est-dot"></span>estimated</span>`:'';
  return `<section class="section"><div class="section-head"><div class="day-name">${d.label||fmtDate(d.date)}${estTag}</div><div class="day-meta"><span class="total${estCount?' est-total':''}">${totalKcal?fmtKcal(totalKcal):'—'}<span class="unit">kcal</span></span></div></div><div class="items">${rows}</div></section>`;
}
function planButton(){ return `<button class="plan-button" type="button" onclick="openWorkoutPlan()">${icon('calendar')}<span>View this week's plan</span></button>`; }
function currentWeekStartIso(){ return weekKey(currentMonday(new Date())); }
function workoutPlans(){ return Array.isArray(DATA.workoutPlans) ? DATA.workoutPlans : []; }
function activeWorkoutPlan(){
  const plans=workoutPlans();
  if(!plans.length) return null;
  const active=getActiveWeek('workout');
  const key=active?.key || currentWeekStartIso();
  return plans.find(p=>p.weekStart===key) || plans.find(p=>p.current===true) || plans.slice().sort((a,b)=>(b.weekStart||'').localeCompare(a.weekStart||''))[0] || null;
}
function planItemText(item){
  if(typeof item==='string') return item;
  if(!item) return '';
  const bits=[item.name||item.title||item.focus, item.duration, item.sets, item.reps, item.note].filter(Boolean);
  return bits.join(' · ');
}
function renderWorkoutPlan(plan){
  if(!plan) return `<div class="plan-note">No workout plan has been logged for this week yet. Once we agree one, I'll save it in the dashboard JSON and it'll show here.</div>`;
  const days=Array.isArray(plan.days)?plan.days:[];
  const blocks=days.map(d=>{
    const title=d.label || d.day || d.date || 'Plan day';
    const focus=d.focus?` · ${d.focus}`:'';
    const items=(d.items||d.exercises||d.workouts||[]).map(planItemText).filter(Boolean);
    const list=items.length?`<ul class="plan-list">${items.map(x=>`<li>${x}</li>`).join('')}</ul>`:(d.note?`<div class="plan-note">${d.note}</div>`:'');
    return `<section class="plan-day"><div class="plan-day-title">${title}${focus}</div>${list||'<div class="plan-note">Details to be added.</div>'}</section>`;
  }).join('');
  return `${plan.notes?`<div class="plan-note">${plan.notes}</div>`:''}${blocks||'<div class="plan-note">Plan exists, but no day details have been added yet.</div>'}`;
}
function openWorkoutPlan(){
  const modal=$('planModal'), content=$('planContent'), sub=$('planSub');
  if(!modal || !content) return;
  const plan=activeWorkoutPlan();
  if(sub) sub.textContent=plan?.weekStart ? `Week of ${fmtWeekRange(currentMonday(new Date(`${plan.weekStart}T12:00:00`)))}` : 'Workout plan';
  content.innerHTML=renderWorkoutPlan(plan);
  modal.classList.add('open');
  modal.setAttribute('aria-hidden','false');
}
function closeWorkoutPlan(){ const modal=$('planModal'); if(modal){ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); } }
function renderWorkout(root){
  const weeks=getWeeksFor('workout');
  if(weeks.length===0){
    root.innerHTML=`<div class="empty">No workouts logged yet<small>Sessions will appear here once you log them</small></div>${planButton()}`;
    return;
  }
  const active=getActiveWeek('workout');
  const days=filterDaysToWeek((DATA.days||[]).filter(dayHasWorkout), active.monday);
  root.innerHTML=`${weekStepper('workout', weeks, active)}<div class="section-stack">${days.map(workDayBlock).join('')}</div>${planButton()}`;
}
function renderFood(root){
  const weeks=getWeeksFor('food');
  if(weeks.length===0){
    root.innerHTML=`<div class="empty">No food logged yet<small>Days will appear here once you log meals</small></div>`;
    return;
  }
  const active=getActiveWeek('food');
  const days=filterDaysToWeek((DATA.days||[]).filter(dayHasFood), active.monday);
  root.innerHTML=`${weekStepper('food', weeks, active)}<div class="section-stack">${days.map(foodDayBlock).join('')}</div>`;
}
function renderProgress(root){
  const start=weightStart(), current=weightCurrent(), goal=weightGoal();
  const lost=stLbToLb(start?.st,start?.lb)-stLbToLb(current?.st,current?.lb);
  const toGo=goal?stLbToLb(current?.st,current?.lb)-stLbToLb(goal.st,goal.lb):null;
  root.innerHTML=`${todayMacrosCard()}${goalProgress()}${weightGraph()}${bodyFatGraph()}`;
  wireWeightSpark(root);
  wireBodyFatSpark(root);
  animateGoalCard(root);
}
const RENDERERS={progress:renderOverview,food:renderFood,workout:renderWorkout,profile:renderProfile};
function renderPage(name, force=false){ if(!DATA) return; if(!force && LOADED[name]) return; const root=$(`page-${name}`); if(!root) return; RENDERERS[name](root); LOADED[name]=true; }
function rerenderAll(){
  mapProteinFields(DATA);
  postDataLoad();
  Object.keys(LOADED).forEach(k=>delete LOADED[k]);
  for(const k of Object.keys(RENDERERS)){
    try{ renderPage(k,true); }catch(err){ console.error('render failed for',k,err); }
  }
}
async function loadData({force=false, quiet=false}={}) {
  try{
    const res=await fetch(`${DATA_URL}?t=${Date.now()}`,{cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const sig=dataSignature(data);
    if(force || sig!==DATA_SIGNATURE){ DATA=data; DATA_SIGNATURE=sig; rerenderAll(); }
  }catch(err){ console.error('data load failed', err); }
}
function setupPollyPopup(){
  const btn=$('pollyBtn'), modal=$('pollyModal'), close=$('pollyClose'), out=$('pollySummary');
  if(!btn || !modal || !close || !out) return;
  const open=()=>{ out.innerHTML=buildPollySummary(); modal.classList.add('open'); modal.setAttribute('aria-hidden','false'); };
  const shut=()=>{ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); };
  btn.addEventListener('click', open);
  close.addEventListener('click', shut);
  modal.addEventListener('click', e=>{ if(e.target===modal) shut(); });
  if(window && typeof window.addEventListener==='function') window.addEventListener('keydown', e=>{ if(e.key==='Escape' && modal.classList.contains('open')) shut(); });
}
function setupWorkoutPlanPopup(){
  const modal=$('planModal'), close=$('planClose');
  if(!modal || !close) return;
  close.addEventListener('click', closeWorkoutPlan);
  modal.addEventListener('click', e=>{ if(e.target===modal) closeWorkoutPlan(); });
  if(window && typeof window.addEventListener==='function') window.addEventListener('keydown', e=>{ if(e.key==='Escape' && modal.classList.contains('open')) closeWorkoutPlan(); });
}
function plainWeight(w){ return !w?'':(w.lb===0?`${w.st}st`:`${w.st}st ${w.lb}lb`); }
function plural(n, one, many=`${one}s`){ return `${n} ${n===1?one:many}`; }
function dayMs(iso){ return new Date(`${iso}T12:00:00`).getTime(); }
function dayDiff(a,b){ return Math.round((dayMs(a)-dayMs(b))/86400000); }
function hasFoodLog(d){ return !!((d.food&&d.food.length)||(d.drinks&&d.drinks.length)); }
function hasActiveLog(d){ return !!(d.workouts&&d.workouts.length); }
function latestWindowDays(days, latestIso, span=7){
  const latest=dayMs(latestIso), earliest=latest-(span-1)*86400000;
  return days.filter(d=>dayMs(d.date)>=earliest && dayMs(d.date)<=latest);
}
function activeStreak(days){
  const map=new Map(days.map(d=>[d.date,d]));
  const sorted=days.slice().sort((a,b)=>b.date.localeCompare(a.date));
  let latest=null;
  for(const d of sorted){
    if(hasActiveLog(d)){ latest=d; break; }
  }
  if(!latest) return 0;
  let count=0, cur=new Date(`${latest.date}T12:00:00`);
  while(true){
    const iso=cur.toISOString().slice(0,10);
    const d=map.get(iso);
    if(!d || !hasActiveLog(d)) break;
    count++;
    cur.setDate(cur.getDate()-1);
  }
  return count;
}
function buildPollySummary(){
  if(!DATA) return `<div class="polly-line">${icon('notepad')}<span>Loading...</span></div>`;
  const p=DATA.profile||{};
  const days=(DATA.days||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const weighIns=(DATA.weighIns||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const start=p.startWeight || weighIns[0];
  const current=p.currentWeight || weighIns.at(-1);
  const goal=p.goalWeight;
  const lines=[];
  const line=(ico, text)=>lines.push(`<div class="polly-line">${icon(ico)}<span>${text}</span></div>`);
  if(start && current){
    const startLb=stLbToLb(start.st,start.lb), curLb=stLbToLb(current.st,current.lb);
    const lost=startLb-curLb;
    if(lost>0) line('scale', `You're currently <strong>${plainWeight(current)}</strong>, which is <strong>${plural(lost,'lb')}</strong> down from your start weight.`);
    else if(lost===0) line('scale', `You're currently <strong>${plainWeight(current)}</strong>, the same as your start.`);
    else line('scale', `You're currently <strong>${plainWeight(current)}</strong>, which is <strong>${plural(Math.abs(lost),'lb')}</strong> up from your start.`);
    if(goal){
      const goalLb=stLbToLb(goal.st,goal.lb), total=startLb-goalLb, remaining=curLb-goalLb;
      if(total>0 && remaining>0) line('target', `Goal progress: <strong>${Math.max(0,lost)} / ${total} lb</strong>. <strong>${plural(remaining,'lb')}</strong> to go.`);
      else if(total>0 && remaining<=0) line('target', `Goal reached based on current data.`);
    }
  } else {
    line('scale', `Add a start and current weight so I can make sense of progress.`);
  }
  if(weighIns.length>=2){
    const last=weighIns.at(-1), prev=weighIns.at(-2);
    const diff=stLbToLb(prev.st,prev.lb)-stLbToLb(last.st,last.lb);
    if(diff>0) line('trend', `Last weigh-in: <strong>${plural(diff,'lb')}</strong> down from previous.`);
    else if(diff===0) line('trend', `Last weigh-in held steady.`);
    else line('trend', `Last weigh-in: <strong>${plural(Math.abs(diff),'lb')}</strong> up from previous.`);
  }
  if(days.length){
    const latest=days.at(-1).date;
    const windowDays=latestWindowDays(days, latest, 7);
    const activeCount=windowDays.filter(hasActiveLog).length;
    const workoutCount=windowDays.reduce((sum,d)=>sum+(d.workouts?.length||0),0);
    const streak=activeStreak(days);
    if(streak>=2) line('steps', `Active streak: <strong>${plural(streak,'day')}</strong> in a row.`);
    else if(streak===1) line('steps', `Latest day was active. Stack another on top.`);
    else line('steps', `No active streak.`);
    if(activeCount>0) line('calendar', `Latest 7 days: <strong>${activeCount}</strong> active days${workoutCount?`, <strong>${workoutCount}</strong> workouts`:''}.`);
    const latestDay=days.at(-1);
    if(hasActiveLog(latestDay)) line('notepad', `Latest active day: <strong>${latestDay.label||fmtDate(latestDay.date)}</strong>.`);
  } else {
    line('calendar', `No daily logs yet.`);
  }
  return lines.join('');
}
function setupTabs(){
  const tabs=[...document.querySelectorAll('.tab')];
  const bar=document.getElementById('tabbar');
  const pill=document.getElementById('tabPill');
  const count=tabs.length;
  const positionPill=(el, animated)=>{
    if(!el || !bar || !pill) return;
    const barRect=bar.getBoundingClientRect();
    const tabRect=el.getBoundingClientRect();
    const x=tabRect.left - barRect.left;
    const w=tabRect.width;
    if(!animated){
      pill.style.transition='none';
      requestAnimationFrame(()=>{ pill.style.transition=''; });
    }
    pill.style.width=w+'px';
    pill.style.transform=`translateX(${x}px)`;
  };
  tabs.forEach(t=>t.addEventListener('click',()=>{
    ACTIVE=t.dataset.tab;
    tabs.forEach(x=>x.classList.toggle('active',x===t));
    document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.dataset.page===ACTIVE));
    $('pageTitle').textContent=t.dataset.title||'Overview';
    positionPill(t,true);
    renderPage(ACTIVE);
  }));
  const initial=tabs.find(t=>t.classList.contains('active')) || tabs[0];
  if(initial){
    setTimeout(()=>positionPill(initial,false), 50);
    const w=typeof window!=='undefined' ? window : null;
    if(w && typeof w.addEventListener==='function'){
      w.addEventListener('resize', ()=>{
        const cur=tabs.find(t=>t.classList.contains('active'));
        if(cur) positionPill(cur,false);
      });
    }
  }
}
(function(){ const btn=$('refreshBtn'); if(btn) btn.addEventListener('click',()=>{btn.classList.remove('spin');void btn.offsetWidth;btn.classList.add('spin');loadData({force:true});}); setupTabs(); setupPollyPopup(); setupWorkoutPlanPopup(); loadData({force:true}); setInterval(()=>loadData({quiet:true}), POLL_MS); })();
</script>
